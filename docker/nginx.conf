server {
    listen 5173 ssl;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types application/json text/html text/css application/javascript text/javascript text/xml application/xml;
    gzip_min_length 512;
    gzip_comp_level 6;
    gzip_vary on;

    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets with hashed filenames (Vite includes content hash)
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Never cache the SPA entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback — return index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
