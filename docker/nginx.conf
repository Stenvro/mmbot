server {
    listen 5173 ssl;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — return index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
