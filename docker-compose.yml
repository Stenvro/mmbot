services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - apexalgo-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - apexalgo-data:/app/data
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  apexalgo-data:
